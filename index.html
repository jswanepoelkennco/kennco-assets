<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KennCo Assets</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      margin: 0;
      background: #f5f7fa;
      color: #1f2937;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 30px;
      color: #4b5563;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #dbe1e8;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      text-align: center;
    }

    .card img {
      width: 100%;
      max-height: 180px;
      object-fit: contain;
      margin-bottom: 12px;
      background: #ffffff;
    }

    .filename {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .link {
      font-size: 13px;
      color: #2563eb;
      text-decoration: none;
    }

    .link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>KennCo Assets</h1>
  <p>Image library hosted on GitHub Pages</p>

  <div class="grid">
    <div class="card">
      <img src="Commercial.png" alt="Commercial" />
      <div class="filename">Commercial.png</div>
      <a class="link" href="Commercial.png" target="_blank">Open image</a>
    </div>

    <div class="card">
      <img src="Financial Lines.png" alt="Financial Lines" />
      <div class="filename">Financial Lines.png</div>
      <a class="link" href="Financial Lines.png" target="_blank">Open image</a>
    </div>

    <div class="card">
      <img src="Home.png" alt="Home" />
      <div class="filename">Home.png</div>
      <a class="link" href="Home.png" target="_blank">Open image</a>
    </div>

    <div class="card">
      <img src="KennCo_Insurance.png" alt="KennCo Insurance" />
      <div class="filename">KennCo_Insurance.png</div>
      <a class="link" href="KennCo_Insurance.png" target="_blank">Open image</a>
    </div>

    <div class="card">
      <img src="KennCo_Underwriting.png" alt="KennCo Underwriting" />
      <div class="filename">KennCo_Underwriting.png</div>
      <a class="link" href="KennCo_Underwriting.png" target="_blank">Open image</a>
    </div>

    <div class="card">
      <img src="Motor Trade.png" alt="Motor Trade" />
      <div class="filename">Motor Trade.png</div>
      <a class="link" href="Motor Trade.png" target="_blank">Open image</a>
    </div>

    <div class="card">
      <img src="Motor.png" alt="Motor" />
      <div class="filename">Motor.png</div>
      <a class="link" href="Motor.png" target="_blank">Open image</a>
    </div>

    <div class="card">
      <img src="Travel.png" alt="Travel" />
      <div class="filename">Travel.png</div>
      <a class="link" href="Travel.png" target="_blank">Open image</a>
    </div>

    <div class="card">
      <img src="Van.png" alt="Van" />
      <div class="filename">Van.png</div>
      <a class="link" href="Van.png" target="_blank">Open image</a>
    </div>
  </div>
</body>
</html>
