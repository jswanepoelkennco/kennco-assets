<script>
  const files = [
    "Commercial.png",
    "Financial_Lines.png",
    "Home.png",
    "KennCo_Insurance.png",
    "KennCo_Underwriting.png",
    "Motor_Trade.png",
    "Motor.png",
    "Travel.png",
    "Van.png"
  ];

  const grid = document.getElementById("assetGrid");

  files.forEach((file, index) => {
    const imageUrl = new URL(file, window.location.href).href;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="preview">
        ${file}
      </div>

      <div class="filename">${file}</div>
      <div class="filepath">${imageUrl}</div>

      <div class="actions">
        ${file}Open image</a>
        ${file}Download</a>
        <button class="btn" type="button" onclick="copyUrl('${imageUrl}', ${index})">Copy image URL</button>
      </div>

      <div class="copied" id="copied-${index}">Copied to clipboard</div>
    `;

    grid.appendChild(card);
  });

  function copyUrl(url, index) {
    navigator.clipboard.writeText(url).then(() => {
      const message = document.getElementById(`copied-${index}`);
      message.style.display = "block";

      setTimeout(() => {
        message.style.display = "none";
      }, 1800);
    }).catch(() => {
      alert("Could not copy the URL. Please copy it manually.");
    });
  }
</script>
