<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KennCo Assets</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background: #f5f7fa;
    }

    h1 {
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
    }

    img {
      max-width: 100%;
      max-height: 140px;
      object-fit: contain;
      margin-bottom: 10px;
    }

    .filename {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    a {
      font-size: 13px;
      color: blue;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <h1>KennCo Assets</h1>
  <p>Image library hosted on GitHub Pages</p>

  <div class="grid">

    <div class="card">
      <img src="images/Commercial.png" />
      <div class="filename">Commercial.png</div>
      <a href="images/Commercial.png" target="_blank">Open image</a>
    </div>

    <div class="card">
      <img src="images/Financial_Lines.png" />
      <div class="filename">Financial_Lines.png</div>
      <a href="images/Financial_Lines.png" target="_blank">Open image</a>
    </div>

    <div class="card">
      <img src="images/Home.png" />
      <div class="filename">Home.png</div>
      <a href="images/Home.png" target="_blank">Open image</a>
    </div>

    <div class="card">
      <img src="images/KennCo_Insurance.png" />
      <div class="filename">KennCo_Insurance.png</div>
      <a href="images/KennCo_Insurance.png" target="_blank">Open image</a>
    </div>

    <div class="card">
      <img src="images/KennCo_Underwriting.png" />
      <div class="filename">KennCo_Underwriting.png</div>
      <a href="images/KennCo_Underwriting.png" target="_blank">Open image</a>
    </div>

    <div class="card">
      <img src="images/Motor_Trade.png" />
      <div class="filename">Motor_Trade.png</div>
      <a href="images/Motor_Trade.png" target="_blank">Open image</a>
    </div>

    <div class="card">
      <img src="images/Motor.png" />
      <div class="filename">Motor.png</div>
      <a href="images/Motor.png" target="_blank">Open image</a>
    </div>

    <div class="card">
      <img src="images/Travel.png" />
      <div class="filename">Travel.png</div>
      <a href="images/Travel.png" target="_blank">Open image</a>
    </div>

    <div class="card">
      <img src="images/Van.png" />
      <div class="filename">Van.png</div>
      <a href="images/Van.png" target="_blank">Open image</a>
    </div>

  </div>
</body>
</html>
